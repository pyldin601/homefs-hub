name: CI homefs-tool-server

on:
  push:
    branches: [main]
    paths:
      - "services/homefs-tool-server/**"
      - "packages/homefs-shared/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".eslintrc.cjs"
  pull_request:
    paths:
      - "services/homefs-tool-server/**"
      - "packages/homefs-shared/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".eslintrc.cjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build shared package
        run: npm run -w homefs-shared build

      - name: Build tool server
        run: npm run -w homefs-tool-server build
