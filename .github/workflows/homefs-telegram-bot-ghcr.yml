name: Build and Push homefs-telegram-bot

on:
  push:
    branches: [main]
    paths:
      - "services/homefs-telegram-bot/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/homefs-telegram-bot/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homefs-telegram-bot:${{ github.sha }}
